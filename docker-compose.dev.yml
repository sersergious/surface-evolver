services:
  backend:
    volumes:
      - ./backend/app:/app/app
      - ./bindings:/app/bindings
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_BASE: http://localhost:8000
