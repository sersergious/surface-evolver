services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      SE_LIB_PATH: /app/libse.so
      SE_FE_DIR: /app/fe

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://backend:8000
      PORT: "80"
    depends_on:
      - backend
