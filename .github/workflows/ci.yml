# .github/workflows/ci.yml
#
# Three independent jobs: C engine tests (macOS + Linux), backend type-check,
# frontend type-check + tests + build.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── C engine: build headless libse and run the C API test suite ──────────────
  c-tests:
    name: C API tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure (headless, Release)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSE_HEADLESS=ON \
            -DBUILD_TESTS=ON

      - name: Build libse + test binary
        run: cmake --build build --parallel 4

      - name: Run C API tests (ctest)
        run: ctest --test-dir build --output-on-failure --timeout 120

  # ── Rust backend: type-check the Tauri app crate ─────────────────────────────
  backend-tests:
    name: Rust backend check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Tauri v2 Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev

      # tauri-build's script validates that externalBin + resource paths exist;
      # a type-check doesn't need the real artifacts — stage placeholders.
      - name: Stage sidecar + resource placeholders
        run: |
          mkdir -p src-tauri/binaries build-native
          touch src-tauri/binaries/se-worker-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/se-worker-x86_64-unknown-linux-gnu
          touch build-native/libse-linux-x64.so

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked

  # ── Frontend type-check, unit tests, production build ────────────────────────
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile Tailwind CSS
        run: bun run css

      - name: TypeScript type-check
        run: bunx tsc --noEmit

      - name: Build production bundle
        run: bun run build
