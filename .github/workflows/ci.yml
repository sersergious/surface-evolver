# .github/workflows/ci.yml
#
# Three independent jobs: C engine tests (macOS + Linux), backend type-check,
# frontend type-check + tests + build.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── C engine: build headless libse and run the C API test suite ──────────────
  c-tests:
    name: C API tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure (headless, Release)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSE_HEADLESS=ON \
            -DBUILD_TESTS=ON

      - name: Build libse + test binary
        run: cmake --build build --parallel 4

      - name: Run C API tests (ctest)
        run: ctest --test-dir build --output-on-failure --timeout 120

  # ── Backend type-check (native IPC, no HTTP server to smoke-test) ────────────
  backend-tests:
    name: Backend type-check (Bun)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install backend dev dependencies
        working-directory: src/main
        run: bun install

      - name: Type-check backend
        working-directory: src/main
        run: bunx tsc --noEmit -p .

  # ── Frontend type-check, unit tests, production build ────────────────────────
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/views

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile Tailwind CSS
        run: bun run css

      - name: TypeScript type-check
        run: bunx tsc --noEmit

      - name: Run Vitest unit tests
        run: bun run test -- --reporter=verbose --reporter=junit --outputFile=../../reports/frontend-tests.xml --passWithNoTests

      - name: Build production bundle
        run: bun run build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-frontend-tests
          path: reports/frontend-tests.xml
          retention-days: 7
