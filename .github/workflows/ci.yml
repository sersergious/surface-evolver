# .github/workflows/ci.yml
#
# Pipeline: c-tests → backend-tests → frontend-tests
#
# libse.so is built once in c-tests and shared as an artifact so every
# downstream job tests the exact same binary.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Stage 1: Build libse.so and run the C API test suite ─────────────────────
  c-tests:
    name: C API tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure (headless, Release)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSE_HEADLESS=ON \
            -DBUILD_TESTS=ON

      - name: Build libse.so + test binary
        run: cmake --build build --parallel $(nproc)

      - name: Run C API tests (ctest)
        run: ctest --test-dir build --output-on-failure --timeout 120

      # Share the library with downstream jobs
      - name: Upload libse.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libse-so
          path: build/libse.so
          retention-days: 1

  # ── Stage 2: Bun backend smoke-test ──────────────────────────────────────────
  backend-tests:
    name: Backend API tests (Bun)
    runs-on: ubuntu-latest
    needs: c-tests

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download libse.so
        uses: actions/download-artifact@v4
        with:
          name: libse-so
          path: build/

      - name: Restore execute permission on shared library
        run: chmod +x build/libse.so

      - name: Install backend dev dependencies
        working-directory: src/main
        run: bun install

      - name: Type-check backend
        working-directory: src/main
        run: bunx tsc --noEmit -p .

      - name: Start backend and run smoke tests
        env:
          SE_LIB_PATH: ${{ github.workspace }}/build/libse.so
          SE_FE_DIR:   ${{ github.workspace }}/fe
        run: |
          bun run src/main/src/server.ts &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:8000/health
          curl -sf http://localhost:8000/api/files | grep -q '\['
          kill $SERVER_PID

  # ── Stage 3: Frontend type-check and unit tests ───────────────────────────────
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: backend-tests

    defaults:
      run:
        working-directory: src/views

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type-check
        run: bunx tsc --noEmit

      - name: Run Vitest unit tests
        run: bun run test -- --reporter=verbose --reporter=junit --outputFile=../../reports/frontend-tests.xml --passWithNoTests

      - name: Build production bundle
        run: bun run build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-frontend-tests
          path: reports/frontend-tests.xml
          retention-days: 7
