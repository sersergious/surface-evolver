# .github/workflows/ci.yml
#
# Pipeline: c-tests → python-tests → backend-tests → frontend-tests
#
# libse.so is built once in c-tests and shared as an artifact so every
# downstream job tests the exact same binary.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Stage 1: Build libse.so and run the C API test suite ─────────────────────
  c-tests:
    name: C API tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Configure (headless, Release)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSE_HEADLESS=ON \
            -DBUILD_TESTS=ON

      - name: Build libse.so + test binary
        run: cmake --build build --parallel $(nproc)

      - name: Run C API tests (ctest)
        run: ctest --test-dir build --output-on-failure --timeout 120

      # Share the library with downstream jobs
      - name: Upload libse.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libse-so
          path: build/libse.so
          retention-days: 1

  # ── Stage 2: Python CFFI wrapper tests ───────────────────────────────────────
  python-tests:
    name: Python wrapper tests
    runs-on: ubuntu-latest
    needs: c-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Download libse.so
        uses: actions/download-artifact@v4
        with:
          name: libse-so
          path: build/

      - name: Restore execute permission on shared library
        run: chmod +x build/libse.so

      - name: Install Python dependencies
        run: pip install cffi pytest

      - name: Run Python wrapper tests
        env:
          SE_LIB_PATH: ${{ github.workspace }}/build/libse.so
          SE_FE_DIR:   ${{ github.workspace }}/fe
        run: |
          pytest tests/python/test_se_api.py \
            -v --tb=short \
            --junit-xml=reports/python-tests.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-python-tests
          path: reports/python-tests.xml
          retention-days: 7

  # ── Stage 3: FastAPI backend integration tests ────────────────────────────────
  backend-tests:
    name: Backend API tests
    runs-on: ubuntu-latest
    needs: python-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Download libse.so
        uses: actions/download-artifact@v4
        with:
          name: libse-so
          path: build/

      - name: Restore execute permission on shared library
        run: chmod +x build/libse.so

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend API tests
        # backend/ is added for `from app.*` imports;
        # repo root is added for `from bindings.python.*` imports.
        env:
          SE_LIB_PATH: ${{ github.workspace }}/build/libse.so
          SE_FE_DIR:   ${{ github.workspace }}/fe
          PYTHONPATH:  ${{ github.workspace }}/backend:${{ github.workspace }}
        run: |
          pytest tests/python/test_backend_api.py \
            -v --tb=short \
            --junit-xml=reports/backend-tests.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-backend-tests
          path: reports/backend-tests.xml
          retention-days: 7

  # ── Stage 4: Frontend type-check and unit tests ───────────────────────────────
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: backend-tests

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run Vitest unit tests
        run: npm test -- --reporter=verbose --reporter=junit --outputFile=../reports/frontend-tests.xml

      - name: Build production bundle
        run: npm run build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-frontend-tests
          path: reports/frontend-tests.xml
          retention-days: 7
