name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Build + C API tests ──────────────────────────────────────────────────
  c-tests:
    name: C build & API tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake

      - name: Configure (headless, tests enabled)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DSE_HEADLESS=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run C API tests (CTest)
        run: ctest --test-dir build --output-on-failure --timeout 120

      # Keep libse.so around for the python-tests job.
      - name: Upload libse.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libse-so
          path: build/libse.so
          retention-days: 1

  # ── 2. Python tests ─────────────────────────────────────────────────────────
  python-tests:
    name: Python API tests
    runs-on: ubuntu-latest
    needs: c-tests           # only run if the C build + tests passed

    steps:
      - uses: actions/checkout@v4

      - name: Download libse.so
        uses: actions/download-artifact@v4
        with:
          name: libse-so
          path: build/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/python/requirements.txt

      - name: Install Python test dependencies
        run: pip install -r tests/python/requirements.txt

      - name: Run Python tests
        env:
          SE_LIB_PATH: build/libse.so
          SE_FE_DIR: fe
        run: pytest tests/python -v --tb=short

  # ── 3. Frontend tests ───────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    # Only run this job when a frontend directory with a package.json exists.
    if: ${{ hashFiles('frontend/package.json') != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run
