name: Build

# Builds the native headless libse on each OS runner (scripts/tauri-before.ts
# → build-native.ts + the compiled se-worker sidecar) and bundles the Tauri
# app. macOS + Linux + Windows (MinGW libse). Trigger on version tags, or manually.
#
# The macOS app is AD-HOC signed (bundle.macOS.signingIdentity "-" in
# tauri.conf.json) — no Developer ID / notarization. First launch:
# right-click → Open, or `xattr -dr com.apple.quarantine`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon → macos-arm64
            artifact: macos-arm64
          - os: ubuntu-latest   # → linux-x64
            artifact: linux-x64
          - os: windows-latest  # → windows-x64 (libse via MinGW/MSYS2)
            artifact: windows-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # create/update the GitHub Release on tag pushes
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 Linux build deps (webkit2gtk renderer).
      # (cmake + a C toolchain are preinstalled on GitHub runners.)
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # libfuse2: linuxdeploy (AppImage bundler) needs FUSE; absent on ubuntu-24.04 runners
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev libfuse2

      # Windows: build libse with MinGW inside MSYS2, stage it, and let
      # tauri-before.ts skip the native rebuild (SE_SKIP_NATIVE below).
      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja

      - name: Build libse (MinGW)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cmake -B cmake-build-release -G Ninja -DSE_HEADLESS=ON -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build cmake-build-release
          mkdir -p build-native
          cp cmake-build-release/libse.dll build-native/libse-windows-x64.dll

      - name: Install dependencies
        run: bun install

      - name: Build app (macOS → .dmg)
        if: runner.os == 'macOS'
        run: bunx tauri build

      - name: Build app (Linux → .deb + .AppImage)
        if: runner.os == 'Linux'
        env:
          # linuxdeploy strips every AppDir executable; strip corrupts the
          # bun-compiled se-worker (embedded JS blob after the ELF sections)
          NO_STRIP: "true"
        run: bunx tauri build --verbose --bundles deb,appimage

      - name: Build app (Windows → NSIS installer)
        if: runner.os == 'Windows'
        env:
          SE_SKIP_NATIVE: "1"
        run: bunx tauri build --bundles nsis

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ "$RUNNER_OS" = "macOS" ]; then
            cp src-tauri/target/release/bundle/dmg/*.dmg "dist/SurfaceEvolver-${{ matrix.artifact }}.dmg"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            cp src-tauri/target/release/bundle/nsis/*.exe "dist/SurfaceEvolver-${{ matrix.artifact }}-setup.exe"
          else
            cp src-tauri/target/release/bundle/deb/*.deb "dist/SurfaceEvolver-${{ matrix.artifact }}.deb"
            cp src-tauri/target/release/bundle/appimage/*.AppImage "dist/SurfaceEvolver-${{ matrix.artifact }}.AppImage"
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: surface-evolver-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

      # On a version-tag push, attach the packaged app to the GitHub Release for
      # that tag. Both matrix jobs target the same release; the action creates it
      # if missing and appends each platform's file.
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
