version: '3.8'

services:
  surface-evolver-vnc:
    build:
      context: .
      dockerfile: dockerfile.vnc
    container_name: surface-evolver-vnc
    environment:
      - DISPLAY=:99
    ports:
      - "6080:6080"  # noVNC web interface
      - "5900:5900"  # VNC port
    volumes:
      # Optional: mount fe directory for live editing
      - ./fe:/app/fe:ro
    command: ["/app/start.sh"]
